global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http-in
    bind *:8081
    mode http

    # ACL: если заголовок Host содержит example.local
    acl is_example hdr(host) -i example.local

    # Перенаправление на соответствующий бэкенд
    use_backend weighted_servers if is_example
    default_backend weighted_servers   # (или можно default_backend, если домен не совпадает)

backend weighted_servers
    balance roundrobin
    # Веса: сервер3 (1), сервер4 (2), сервер5 (3)
    server srv3 127.0.0.1:8003 weight 1 check
    server srv4 127.0.0.1:8004 weight 2 check
    server srv5 127.0.0.1:8005 weight 3 check
